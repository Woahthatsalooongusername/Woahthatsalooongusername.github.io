<!DOCTYPE html>
<html lang="en">
	<head>
		<title>My First Canvas</title>
		<style>
		canvas{
		border: black 1px solid;
		}
		</style>
	</head>
	<body>
		<h1>Here's a canvas</h1>
		<canvas id="canvas" width="800" height="800">
		</canvas>
		<script>
		const canvas = document.getElementById("canvas");
		const ctx = canvas.getContext("2d");




		//circle 1
		ctx.fillStyle = "gray";
		ctx.beginPath();
		ctx.arc(300,200,100,0,2*Math.PI);
		ctx.fill();
		//bezier
		ctx.beginPath();
		ctx.moveTo(100,100);
		ctx.quadraticCurveTo(300,300,200,100);
		ctx.stroke();
		//circle 2
		ctx.fillStyle = "black";
		ctx.beginPath();
		ctx.arc(300,300,100,0,2*Math.PI);
		</script>

	</body>
	
</html>
